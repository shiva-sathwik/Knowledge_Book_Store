<main>
<form id="editprofile">

    <h2 style="text-align:center;">Edit Profile</h2>
    <br>

    <div style="text-align:center;">

        <input type="text" id="edituser" placeholder="Enter Username"

        <input type="number" id="editphone" placeholder="Enter Phone Number"
            style="padding:1%; font-size:large;"><br><br>

        <input type="text" id="editemail" placeholder="Enter Email"
            style="padding:1%; font-size:large;"><br><br>
        
        <input type="text" id="editaddress" placeholder=" 4/15-3, street no. 15, kilash Nagar, Nirmal "
            style="padding: 1%; font-size: large;"> <br><br>

        <a href="index.html" target="_main">
        <input type="button" value="Update Profile" onclick="editUser()"
            style="padding:1%; font-size:large;">
        </a>
        <input type="reset" value="Reset"
            style="padding:1%; font-size:large;">    
        </div>

</form>
