<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/pay.js"></script>
</head>
<body>
         <header class="header">
      <h1 style="font-size: 500%;"><i> Knowledge Book Store </i></h1>
      <a href="login.html" , target="_main">
        <p style="text-align: right">
          <img
            src="login.jpg"
            ,
            alt="Login"
            class="icon"
          />
        </p>
      </a>
      <div style="text-align: center" class="book-card button">
        <input type="search" placeholder="search" size="50" style="padding: 1%; font-size: medium;">
      </div>
      <div style="text-align: right">
        <a href="index.html" target="_main">
          <img
            src="homepage.png"
            alt="Home Page"
            class="icon"
          />
        </a>
        <a href="UserProfile.html" target="_main">
          <img
            src="userprofile.png"
            ,
            alt="profil"
            class="icon"
          />
        </a>
        <a href="shopingcart.html" target="_main">
          <img
            src="cart.avif"
            ,
            alt="Cart"
            class="icon"
          />
        </a>
        <img
          src="cate.png"
          ,
          alt="category"
          class="icon"
        />
      </div>
      <div class="book-card button">
        <a href="aboutus.html">
        <input type="button" value="About us" style="padding: 1%; font-size: large;" />
        </a>
        <select name="All Catagories" style="padding: 1%; font-size: large;">
          <option>All Catagories</option>
          <option>Store</option>
          <option>History</option>
          <option>Science</option>
        </select>
        <input type="button" value="Free Books" style="padding: 1%; font-size: large;" />
        <a href="BookCatalog.html" target="_main"
          ><input type="button" value="Book Catalogue" style="padding: 1%; font-size: large;"
        /></a>
        <input type="button" value="Contact" style="padding: 1%; font-size: large;" />
        <input type="button" value="Tearms and Conditions" style="padding: 1%; font-size: large;" />
       <input type="button" value="FAQ's" style="padding: 1%; font-size: large;" />
      </div>
    </header>
    <hr>
    <main>
        <form style="text-align: center; color: darkblue;">
            Address : <input type="text" placeholder="Full Address">
            <div>
                UPI :
                <br>
                Phonepe<input type="radio" >
                <br>
                Paytm<input type="radio">
                <br>
                Gpay<input type="radio">
                <br>
            </div>
            <a href="Conform.html" target="_main">
            <input type="button" value="Proceed">
            </a>
        </form>
        <hr>
        <h3 style="text-align: center;">OR</h3>
        <hr>
        <form style="text-align: center; color: #000000" id="payform">
            <div>
            Card Holder Name = <br> <input id="paycardholder" type="text" placeholder="Name of Person">
            <br><br>
            Card Number = <br><input id="paycardno" type="tel" placeholder="card no." size="17" max="16">
            <br><br>
            Expiry Date = <br> <input id="payexpiry" type="tel" placeholder="Expiry Date" size="12" max="6">
            <br><br>
            CVV = <br> <input id="paycvv" type="password" placeholder="CVV" size="6">
            </div>
            <br><br>
            <div>
            
            <input onclick="payUser()" type="button" value="Proceed to take Order" style="padding: 1%; font-size: large; padding-right: 5%; padding-left: 5%;">
            
            </div>
        </form>
    </main>
</body>
</html>
