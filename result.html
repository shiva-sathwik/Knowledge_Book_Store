<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
<script>

function getBook()
{
    var params = new URLSearchParams(window.location.search);
    var bookName = params.get("book").toLowerCase();

    var xhttp = new XMLHttpRequest();
    xhttp.open("GET","BookCatalog.xml",true);

    xhttp.onreadystatechange = function()
    {
        if(this.readyState==4 && this.status==200)
        {
            var xml = this.responseXML;
            var books = xml.getElementsByTagName("book");

            var output = "Book not found";

            for(var i=0;i<books.length;i++)
            {
                var title = books[i].getElementsByTagName("title")[0].childNodes[0].nodeValue;

                if(title.toLowerCase().includes(bookName))
                {
                    var author = books[i].getElementsByTagName("author")[0].childNodes[0].nodeValue;
                    var price = books[i].getElementsByTagName("price")[0].childNodes[0].nodeValue;
                    var year = books[i].getElementsByTagName("year")[0].childNodes[0].nodeValue;
                    var image = books[i].getElementsByTagName("image")[0].childNodes[0].nodeValue;

                    output =
                    "<h2>"+title+"</h2>" +
                    "<img src='"+image+"' width='200'><br><br>" +
                    "Author: "+author+"<br>" +
                    "Price: ₹"+price+"<br>" +
                    "Year: "+year;
                }
            }

            document.getElementById("result").innerHTML = output;
        }
    };

    xhttp.send();
}

</script>

</head>
<body  onload="getBook()">
     <header class="header">
      <h1 style="font-size: 500%;"><i> Knowledge Book Store </i></h1>
      <a href="login.html" , target="_main">

            src="images/login.jpg"
            ,
            alt="Login"
            class="icon"
          />
        </p>
      </a>
      <div style="text-align: center" class="book-card button">
        <input type="text" id="searchBox" placeholder="Enter Book Name" size="50" style="padding: 1%; font-size: large;">

        <button onclick="searchBook()" size="50" style="padding: 1%; font-size: large;">Search</button>
      </div>
      <div style="text-align: right">
        <a href="index.html" target="_main">
          <img
            src="images/homepage.png"
            alt="Home Page"
            class="icon"
          />
        </a>
        <a href="UserProfile.html" target="_main">
          <img
            src="images/userprofile.png"
            ,
            alt="profil"
            class="icon"
          />
        </a>
        <a href="shopingcart.html" target="_main">
          <img
            src="images/cart.avif"
            ,
            alt="Cart"
            class="icon"
          />
        </a>
        <img
          src="images/cate.png"
          ,
          alt="category"
          class="icon"
        />
      </div>
      <div class="book-card button">
        <a href="aboutus.html">
        <input type="button" value="About us" style="padding: 1%; font-size: large;" />
        </a>
        <select name="All Catagories" style="padding: 1%; font-size: large;">
          <option>All Catagories</option>
          <option>Store</option>
          <option>History</option>
          <option>Science</option>
        </select>
        <input type="button" value="Free Books" style="padding: 1%; font-size: large;" />
        <a href="BookCatalog.html" target="_main"
          ><input type="button" value="Book Catalogue" style="padding: 1%; font-size: large;"
        /></a>
        <input type="button" value="Contact" style="padding: 1%; font-size: large;" />
        <input type="button" value="Tearms and Conditions" style="padding: 1%; font-size: large;" />
       <input type="button" value="FAQ's" style="padding: 1%; font-size: large;" />
      </div>
    </header>
    <hr />
    <main>
        <h1>Book Details</h1>

        <div id="result"></div>
    </main>
</body>
</html>
